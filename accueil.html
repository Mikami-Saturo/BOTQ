<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Pour toi, Marie Ange 🎂</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --c1: #ff6fd8;
        --c2: #ff9a3c;
        --c3: #a78bfa;
        --c4: #38bdf8;
        --c5: #34d399;
        --dark: #0d0d1a;
        --card: rgba(255, 255, 255, 0.07);
        --border: rgba(255, 255, 255, 0.15);
      }

      html,
      body {
        height: 100%;
        background: var(--dark);
        color: #fff;
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
      }

      /* ─── BACKGROUND ─── */
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.45;
        animation: drift 12s ease-in-out infinite alternate;
      }
      .blob-1 {
        width: 340px;
        height: 340px;
        background: var(--c1);
        top: -80px;
        left: -60px;
        animation-delay: 0s;
      }
      .blob-2 {
        width: 280px;
        height: 280px;
        background: var(--c3);
        top: 30%;
        right: -80px;
        animation-delay: -3s;
      }
      .blob-3 {
        width: 250px;
        height: 250px;
        background: var(--c2);
        bottom: 10%;
        left: 20%;
        animation-delay: -6s;
      }
      .blob-4 {
        width: 200px;
        height: 200px;
        background: var(--c4);
        top: 60%;
        left: -40px;
        animation-delay: -9s;
      }

      @keyframes drift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(30px, 20px) scale(1.08);
        }
      }

      /* ─── PARTICLES ─── */
      #particles {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* ─── MAIN ─── */
      main {
        position: relative;
        z-index: 2;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px 80px;
        text-align: center;
      }

      /* ─── TOP BADGE ─── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);
        border-radius: 999px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.75);
        margin-bottom: 32px;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards 0.3s;
      }
      .badge-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--c5);
        box-shadow: 0 0 8px var(--c5);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.3);
        }
      }

      /* ─── HEADLINE ─── */
      .headline {
        font-family: "Playfair Display", serif;
        font-size: clamp(44px, 12vw, 72px);
        line-height: 1.1;
        margin-bottom: 12px;
        opacity: 0;
        animation: fadeUp 0.9s ease forwards 0.6s;
      }
      .headline .for {
        font-style: italic;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.55em;
        display: block;
        margin-bottom: 4px;
      }
      .headline .name {
        background: linear-gradient(135deg, var(--c1), var(--c2), var(--c3));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: block;
      }

      /* ─── SUBTITLE ─── */
      .subtitle {
        font-size: 15px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.55);
        max-width: 280px;
        line-height: 1.6;
        margin-bottom: 48px;
        opacity: 0;
        animation: fadeUp 0.9s ease forwards 0.9s;
      }

      /* ─── HEART ─── */
      .heart-wrap {
        margin-bottom: 48px;
        opacity: 0;
        animation: fadeUp 0.9s ease forwards 1.1s;
      }
      .heart {
        font-size: 64px;
        display: inline-block;
        animation: heartbeat 1.4s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(255, 111, 216, 0.7));
      }
      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        14% {
          transform: scale(1.18);
        }
        28% {
          transform: scale(1);
        }
        42% {
          transform: scale(1.12);
        }
        70% {
          transform: scale(1);
        }
      }

      /* ─── NAV CARDS ─── */
      .nav-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        max-width: 360px;
        opacity: 0;
        animation: fadeUp 1s ease forwards 1.4s;
      }
      .nav-card {
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(16px);
        border-radius: 20px;
        padding: 18px 14px;
        text-decoration: none;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        transition:
          transform 0.25s ease,
          background 0.25s ease,
          box-shadow 0.25s ease;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-card:active {
        transform: scale(0.95);
      }
      .nav-card .icon {
        font-size: 28px;
      }
      .nav-card .label {
        font-size: 11px;
        font-weight: 500;
        text-align: center;
        letter-spacing: 0.03em;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.3;
      }
      .nav-card.full {
        grid-column: 1 / -1;
      }

      .nav-card:nth-child(1) {
        --accent: var(--c1);
      }
      .nav-card:nth-child(2) {
        --accent: var(--c3);
      }
      .nav-card:nth-child(3) {
        --accent: var(--c2);
      }
      .nav-card:nth-child(4) {
        --accent: var(--c4);
      }
      .nav-card:nth-child(5) {
        --accent: var(--c5);
      }
      .nav-card:nth-child(6) {
        --accent: var(--c1);
      }
      .nav-card:nth-child(7) {
        --accent: var(--c2);
      }

      .nav-card:hover,
      .nav-card:active {
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 0 24px -4px var(--accent);
        border-color: var(--accent);
      }

      /* ─── FOOTER ─── */
      .footer {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: rgba(255, 255, 255, 0.25);
        letter-spacing: 0.06em;
        z-index: 3;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ─── RIPPLE ─── */
      @keyframes ripple {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }
      .ripple-effect {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        width: 40px;
        height: 40px;
        margin-left: -20px;
        margin-top: -20px;
        animation: ripple 0.6s linear;
        pointer-events: none;
      }

      .btn-next {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 38px;
        background: linear-gradient(135deg, var(--c1), var(--c3));
        border-radius: 999px;
        color: #fff;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        box-shadow: 0 8px 32px rgba(255, 111, 216, 0.4);
        animation: fadeUp 1s ease forwards 1.4s;
        opacity: 0;
        -webkit-tap-highlight-color: transparent;
      }

      .btn-next:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 40px rgba(255, 111, 216, 0.6);
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }
    </style>
  </head>
  <body>
    <!-- Background blobs -->
    <div class="bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>

    <!-- Floating particles -->
    <canvas id="particles"></canvas>

    <main>
      <div class="badge">
        <span class="badge-dot"></span>
        Joyeux Anniversaire 🎂
      </div>

      <h1 class="headline">
        <span class="for">Pour toi,</span>
        <span class="name">Marie Ange</span>
      </h1>

      <p class="subtitle">
        Ce petit coin du web a été créé rien que pour toi, avec tout mon amour
        💫
      </p>

      <div class="heart-wrap">
        <span class="heart">💖</span>
      </div>

      <a class="btn-next" href="./speciale.html">Découvre pourquoi tu es spéciale ✨</a>
    </main>

    <div class="footer">fait avec 💖 pour Marie Ange</div>

    <script>
      // ─── PARTICLES ───
      const canvas = document.getElementById("particles");
      const ctx = canvas.getContext("2d");
      let W,
        H,
        particles = [];

      const colors = ["#ff6fd8", "#ff9a3c", "#a78bfa", "#38bdf8", "#34d399"];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticle() {
        return {
          x: Math.random() * W,
          y: Math.random() * H + H,
          r: Math.random() * 3 + 1,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 0.6,
          vy: -(Math.random() * 1.2 + 0.4),
          alpha: Math.random() * 0.6 + 0.3,
          life: 0,
          maxLife: Math.random() * 200 + 100,
        };
      }

      function initParticles() {
        particles = Array.from({ length: 60 }, createParticle);
      }

      function animParticles() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          p.life++;
          const fade =
            p.life < 30
              ? p.life / 30
              : p.life > p.maxLife - 30
                ? (p.maxLife - p.life) / 30
                : 1;
          ctx.save();
          ctx.globalAlpha = p.alpha * fade;
          ctx.fillStyle = p.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          if (p.life >= p.maxLife || p.y < -20) particles[i] = createParticle();
        });
        requestAnimationFrame(animParticles);
      }

      resize();
      initParticles();
      animParticles();
      window.addEventListener("resize", () => {
        resize();
      });

      // ─── RIPPLE on nav cards ───
      document.querySelectorAll(".nav-card").forEach((card) => {
        card.addEventListener("click", function (e) {
          const rect = this.getBoundingClientRect();
          const rip = document.createElement("span");
          rip.className = "ripple-effect";
          rip.style.left = e.clientX - rect.left + "px";
          rip.style.top = e.clientY - rect.top + "px";
          this.style.position = "relative";
          this.style.overflow = "hidden";
          this.appendChild(rip);
          setTimeout(() => rip.remove(), 600);
        });
      });
    </script>
  </body>
</html>
